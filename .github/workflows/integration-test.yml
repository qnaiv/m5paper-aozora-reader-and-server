name: 結合テスト - 青空文庫スクレイピング

on:
  pull_request:
      branches: [ main ]
          paths:
                - 'scripts/fetch_aozora.py'
                      - 'test_integration.py' 
                            - 'requirements.txt'
                              schedule:
                                  # 毎日午前9時（JST）に実行
                                      - cron: '0 0 * * *'
                                        workflow_dispatch:

                                        jobs:
                                          integration-test:
                                              runs-on: ubuntu-latest
                                                  timeout-minutes: 10
                                                      
                                                          steps:
                                                              - name: リポジトリをチェックアウト
                                                                    uses: actions/checkout@v4
                                                                          
                                                                              - name: Python環境をセットアップ
                                                                                    uses: actions/setup-python@v4
                                                                                          with:
                                                                                                  python-version: '3.11'
                                                                                                          
                                                                                                              - name: 依存関係をインストール
                                                                                                                    run: |
                                                                                                                            echo "📦 依存関係をインストール中..."
                                                                                                                                    pip3 install -r requirements.txt
                                                                                                                                            
                                                                                                                                                - name: ユニットテストを実行
                                                                                                                                                      run: |
                                                                                                                                                              echo "📝 ユニットテスト実行中..."
                                                                                                                                                                      python3 test_fetch_aozora.py
                                                                                                                                                                              
                                                                                                                                                                                  - name: 結合テストを実行
                                                                                                                                                                                        run: |
                                                                                                                                                                                                echo "🌐 結合テスト実行中（実際のネットワーク通信）..."
                                                                                                                                                                                                        python3 test_integration.py
                                                                                                                                                                                                                
                                                                                                                                                                                                                    - name: 実際のスクレイピングを実行
                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                  echo "📚 実際のスクレイピング実行中..."
                                                                                                                                                                                                                                          python3 scripts/fetch_aozora.py
                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                      - name: 出力ファイルを検証
                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                    echo "✅ 出力ファイル検証中..."
                                                                                                                                                                                                                                                                            # ファイルが作成されていることを確認
                                                                                                                                                                                                                                                                                    test -f data/todays_book.json || (echo "❌ JSONファイルが作成されていません" && exit 1)
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                    # JSON形式が正しいことを確認
                                                                                                                                                                                                                                                                                                            python3 -c "
                                                                                                                                                                                                                                                                                                            import json
                                                                                                                                                                                                                                                                                                            import sys
                                                                                                                                                                                                                                                                                                            try:
                                                                                                                                                                                                                                                                                                                with open('data/todays_book.json', 'r', encoding='utf-8') as f:
                                                                                                                                                                                                                                                                                                                        data = json.load(f)
                                                                                                                                                                                                                                                                                                                            print('✅ 有効なJSON形式です')
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                    # 必須フィールドの確認
                                                                                                                                                                                                                                                                                                                                        required_fields = ['title', 'author', 'content', 'url', 'char_count']
                                                                                                                                                                                                                                                                                                                                            missing = [f for f in required_fields if f not in data]
                                                                                                                                                                                                                                                                                                                                                if missing:
                                                                                                                                                                                                                                                                                                                                                        print(f'❌ 必須フィールドが不足: {missing}')
                                                                                                                                                                                                                                                                                                                                                                sys.exit(1)
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                        # 文字数確認
                                                                                                                                                                                                                                                                                                                                                                            if data.get('char_count', 0) < 500:
                                                                                                                                                                                                                                                                                                                                                                                    print(f'❌ 文字数不足: {data[\"char_count\"]}文字（500文字以上必要）')
                                                                                                                                                                                                                                                                                                                                                                                            sys.exit(1)
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                        print(f'📖 作品: {data[\"title\"]} - {data[\"author\"]}')
                                                                                                                                                                                                                                                                                                                                                                                                            print(f'📊 文字数: {data[\"char_count\"]}文字')
                                                                                                                                                                                                                                                                                                                                                                                                                print(f'🔗 URL: {data[\"url\"]}')
                                                                                                                                                                                                                                                                                                                                                                                                                    print('✅ すべての検証に合格しました')
                                                                                                                                                                                                                                                                                                                                                                                                                    except Exception as e:
                                                                                                                                                                                                                                                                                                                                                                                                                        print(f'❌ JSON検証エラー: {e}')
                                                                                                                                                                                                                                                                                                                                                                                                                            sys.exit(1)
                                                                                                                                                                                                                                                                                                                                                                                                                            "
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: 成果物をアップロード
                                                                                                                                                                                                                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: todays-book-json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          path: data/todays_book.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  retention-days: 30